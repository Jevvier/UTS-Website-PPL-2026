<svg xmlns="http://www.w3.org/2000/svg" width="220" height="150" viewBox="0 0 220 150">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
  </defs>
  <rect width="220" height="150" fill="url(#g)"/>
  <!-- decorative circles -->
  <circle cx="160" cy="60" r="80" fill="white" fill-opacity="0.07"/>
  <circle cx="80" cy="100" r="100" fill="white" fill-opacity="0.05"/>
  <!-- mountain/wave shape -->
  <polygon points="0,105 55,75 110,90 165,60 220,90 220,150 0,150" fill="white" fill-opacity="0.08"/>
  <!-- label -->
  <text x="50%" y="44%" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia,serif" font-size="30" fill="white" font-weight="bold"
        filter="drop-shadow(0 2px 4px rgba(0,0,0,0.5))">🏯 Borobudur</text>
  <text x="50%" y="62%" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial,sans-serif" font-size="16" fill="white" fill-opacity="0.9">Magelang, Jawa Tengah</text>
</svg>
