<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#5c6bc0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="180" fill="url(#g)"/>
  <!-- decorative circles -->
  <circle cx="260" cy="60" r="80" fill="white" fill-opacity="0.07"/>
  <circle cx="80" cy="130" r="100" fill="white" fill-opacity="0.05"/>
  <!-- mountain/wave shape -->
  <polygon points="0,126 80,90 160,108 240,72 320,108 320,180 0,180" fill="white" fill-opacity="0.08"/>
  <!-- label -->
  <text x="50%" y="44%" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia,serif" font-size="36" fill="white" font-weight="bold"
        filter="drop-shadow(0 2px 4px rgba(0,0,0,0.5))">🏔️ Danau Toba</text>
  <text x="50%" y="62%" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial,sans-serif" font-size="20" fill="white" fill-opacity="0.9">Sumatera Utara</text>
</svg>
